services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: ai-dev-flow-telemetry
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (i progetti puntano qui)
    volumes:
      - telemetry-data:/data
    restart: unless-stopped

volumes:
  telemetry-data:
