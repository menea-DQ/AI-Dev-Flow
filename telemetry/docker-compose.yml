services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: ai-dev-flow-telemetry
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (i progetti puntano qui)
    volumes:
      - telemetry-data:/data
      - ./prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
    restart: unless-stopped
    depends_on:
      - plan-exporter

  plan-exporter:
    image: node:slim
    container_name: ai-dev-flow-plan-exporter
    working_dir: /app
    volumes:
      - ./plan-exporter.mjs:/app/plan-exporter.mjs:ro
      - ./plans.json:/app/plans.json:ro
    command: node plan-exporter.mjs
    restart: unless-stopped

volumes:
  telemetry-data:
